<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0F1B2D;
}

.card {
  width: 1200px;
  height: 630px;
  background: #0F1B2D;
  position: relative;
  display: flex;
  overflow: hidden;
}

/* === BACKGROUND LAYERS === */

/* Subtle dot grid */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, rgba(184,212,232,0.06) 1px, transparent 1px);
  background-size: 32px 32px;
  z-index: 0;
}

/* Blue glow top-right */
.glow-blue {
  position: absolute;
  top: -160px;
  right: 180px;
  width: 580px;
  height: 580px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(107,163,200,0.10) 0%, transparent 68%);
  z-index: 0;
}

/* Rose glow bottom-left */
.glow-rose {
  position: absolute;
  bottom: -140px;
  left: -80px;
  width: 440px;
  height: 440px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(196,132,143,0.07) 0%, transparent 68%);
  z-index: 0;
}

/* === LEFT PANEL === */

.left {
  flex: 0 0 700px;
  padding: 68px 72px 60px 72px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: #C4848F;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 22px;
}

.eyebrow-rule {
  display: inline-block;
  width: 26px;
  height: 1px;
  background: #C4848F;
  flex-shrink: 0;
}

.name {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 76px;
  line-height: 0.95;
  color: #E8F2F8;
  letter-spacing: -0.025em;
  margin-bottom: 18px;
}

.tagline {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 30px;
  font-style: italic;
  color: #B8D4E8;
  line-height: 1.2;
  margin-bottom: 30px;
}

.tags {
  display: flex;
  gap: 9px;
  flex-wrap: wrap;
  margin-bottom: 36px;
}

.tag {
  font-family: 'DM Sans', sans-serif;
  font-size: 11.5px;
  padding: 5px 14px;
  border-radius: 20px;
  letter-spacing: 0.04em;
  background: rgba(255,255,255,0.05);
  color: #8BAABB;
  border: 0.5px solid rgba(255,255,255,0.1);
}

.tag.gold {
  background: rgba(201,150,26,0.12);
  color: #E8C97A;
  border-color: rgba(201,150,26,0.28);
}

.domain-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.domain-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #4CAF8A;
  flex-shrink: 0;
}

.domain {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: #4A6A80;
  letter-spacing: 0.04em;
}

/* === DIVIDER === */

.divider {
  position: absolute;
  left: 700px;
  top: 64px;
  bottom: 64px;
  width: 0.5px;
  background: rgba(255,255,255,0.07);
  z-index: 3;
}

/* === RIGHT PANEL === */

.right {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
  gap: 20px;
}

/* Large background star (very faint) */
.star-bg {
  position: absolute;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.055;
  z-index: 1;
}

/* Foreground star (visible) */
.star-fg {
  position: relative;
  z-index: 3;
  filter: drop-shadow(0 0 28px rgba(107,163,200,0.22));
}

.right-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: #5A7A90;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  position: relative;
  z-index: 3;
  line-height: 1.7;
}

/* === TOP BORDER === */
.top-border {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, rgba(196,132,143,0.4) 20%, rgba(107,163,200,0.5) 50%, rgba(201,150,26,0.3) 80%, transparent 100%);
  z-index: 4;
}

</style>
</head>
<body>
<div class="card">
  <div class="bg-grid"></div>
  <div class="glow-blue"></div>
  <div class="glow-rose"></div>
  <div class="top-border"></div>
  <div class="divider"></div>

  <!-- LEFT: identity -->
  <div class="left">
    <div class="eyebrow">
      <span class="eyebrow-rule"></span>
      product leader · minneapolis, mn
    </div>
    <div class="name">Ryan<br>Corcoran</div>
    <div class="tagline">Products with a pulse.</div>
    <div class="tags">
      <span class="tag">Digital Health</span>
      <span class="tag">Care Navigation</span>
      <span class="tag">Medtech</span>
      <span class="tag">Behavioral Health</span>
      <span class="tag gold">0 → 1 Builds</span>
    </div>
    <div class="domain-row">
      <span class="domain-dot"></span>
      <span class="domain">ryan-corcoran.com</span>
    </div>
  </div>

  <!-- RIGHT: star mark + label -->
  <div class="right">
    <!-- Large faint bg star -->
    <div class="star-bg">
      <svg width="420" height="420" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="12,1 13.07,9.4 16.6,7.4 14.6,10.9 23,12 14.6,13.07 16.6,16.6 13.07,14.6 12,23 10.93,14.6 7.4,16.6 9.4,13.07 1,12 9.4,10.93 7.4,7.4 10.93,9.4" fill="#6BA3C8"/>
      </svg>
    </div>

    <!-- Foreground star -->
    <div class="star-fg">
      <svg width="110" height="110" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <polygon points="12,1 13.07,9.4 16.6,7.4 14.6,10.9 23,12 14.6,13.07 16.6,16.6 13.07,14.6 12,23 10.93,14.6 7.4,16.6 9.4,13.07 1,12 9.4,10.93 7.4,7.4 10.93,9.4" fill="#6BA3C8" opacity="0.9"/>
      </svg>
    </div>

    <div class="right-label">
      Senior PM · Director<br>
      Digital Health + Medtech
    </div>
  </div>

</div>
</body>
</html>
